<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" role="img" aria-label="Mantilhue Alimentos">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Yellowtail&amp;family=Montserrat:wght@700&amp;display=swap');
      .wordmark {
        font-family: 'Yellowtail', cursive;
        font-size: 150px;
        fill: #1F1F1F;
        letter-spacing: -2px;
      }
      .label {
        font-family: 'Montserrat', sans-serif;
        font-weight: 700;
        font-size: 30px;
        letter-spacing: 10px;
        fill: #8BA83E;
      }
    </style>
  </defs>

  <!-- Wordmark Mantilhue -->
  <text x="40" y="140" class="wordmark">Mantilhue</text>

  <!-- Espiga (grain icon) en vez de hoja genérica -->
  <g transform="translate(770, 30) scale(1)" fill="#8BA83E" stroke="#8BA83E">
    <!-- Tallo central -->
    <path d="M35 5 C 38 40, 38 80, 35 130" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- Granos en pares alternados -->
    <ellipse cx="20" cy="30" rx="9" ry="16" transform="rotate(-28 20 30)"/>
    <ellipse cx="50" cy="35" rx="9" ry="16" transform="rotate(28 50 35)"/>
    <ellipse cx="18" cy="55" rx="9" ry="16" transform="rotate(-28 18 55)"/>
    <ellipse cx="52" cy="60" rx="9" ry="16" transform="rotate(28 52 60)"/>
    <ellipse cx="20" cy="80" rx="9" ry="16" transform="rotate(-28 20 80)"/>
    <ellipse cx="50" cy="85" rx="9" ry="16" transform="rotate(28 50 85)"/>
    <ellipse cx="25" cy="105" rx="9" ry="16" transform="rotate(-28 25 105)"/>
    <ellipse cx="45" cy="110" rx="9" ry="16" transform="rotate(28 45 110)"/>
    <!-- Punta superior -->
    <ellipse cx="35" cy="12" rx="7" ry="12"/>
  </g>

  <!-- Subtítulo ALIMENTOS con separadores gruesos -->
  <line x1="40" y1="210" x2="240" y2="210" stroke="#8BA83E" stroke-width="4" stroke-linecap="round"/>
  <text x="275" y="222" class="label">ALIMENTOS</text>
  <line x1="700" y1="210" x2="860" y2="210" stroke="#8BA83E" stroke-width="4" stroke-linecap="round"/>
</svg>
